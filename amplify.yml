version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -e AWS_REGION >> .env.production
        - env | grep -e DYNAMODB_TABLE_NAME >> .env.production
        - env | grep -e COGNITO_USER_POOL_ID >> .env.production
        - env | grep -e COGNITO_CLIENT_ID >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*